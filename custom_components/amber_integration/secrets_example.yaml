################################################################################
# Home Assistant Secrets - ha-custom-amber-integration
################################################################################
#
# Fill in your credentials below.
#
# IMPORTANT:
#   - Never share this file or commit it to version control
#   - Add secrets.yaml to your .gitignore
#   - Keep a secure backup copy somewhere safe
#
################################################################################

################################################################################
# Amber Electric App Login
# Used by: /config/scripts/amber_auth.py
#
# These are your Amber app login credentials - the same email and password
# you use to log into the Amber mobile app or website.
################################################################################

amber_email: your@email.com.au
amber_password: your_amber_password

################################################################################
# Home Assistant Long-Lived Access Token
# Used by: /config/scripts/amber_graphql.py (to update HA entity states)
#
# How to generate:
#   1. In HA click your username/avatar in the bottom left sidebar
#   2. Scroll to the bottom of the Profile page
#   3. Under Long-Lived Access Tokens click Create Token
#   4. Give it a name e.g. amber_smartshift
#   5. Copy the token immediately - it will NOT be shown again
#
# Tokens expire after 10 years by default.
################################################################################

ha_long_lived_token: your_ha_token_here
ha_url: http://localhost:8123

################################################################################
# Gmail SMTP - Email Notifications
# Used by: configuration.yaml notify section
#
# How to set up Gmail App Password:
#   1. Go to https://myaccount.google.com/security
#   2. Enable 2-Step Verification (required)
#   3. Go to https://myaccount.google.com/apppasswords
#   4. Select app: Mail, device: Other, enter "Home Assistant"
#   5. Copy the 16-character generated password
#
# Use the App Password here - NOT your regular Gmail password.
################################################################################

smtp_username: your.gmail@gmail.com
smtp_password: your_app_password_here
