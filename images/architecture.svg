<svg width="100%" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    text { font-family: sans-serif; fill: #1a1a1a; }
    .th { font-size: 14px; font-weight: 600; }
    .ts { font-size: 12px; font-weight: 400; fill: #444; }
    .arr { stroke: #666; stroke-width: 1.5; fill: none; }
    .dashed { stroke: #999; stroke-width: 1; fill: none; stroke-dasharray: 4 3; }
  </style>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-dashed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Amber API (top) -->
<rect x="220" y="20" width="240" height="50" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text class="th" x="340" y="40" text-anchor="middle" dominant-baseline="central">Amber Electric API</text>
<text class="ts" x="340" y="57" text-anchor="middle" dominant-baseline="central">GraphQL · SmartShiftLive</text>

<!-- Arrow: Amber API → amber_graphql.py -->
<line x1="340" y1="70" x2="340" y2="108" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="355" y="93" dominant-baseline="central">live cmd</text>

<!-- amber_graphql.py -->
<rect x="190" y="108" width="300" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="340" y="128" text-anchor="middle" dominant-baseline="central">amber_graphql.py</text>
<text class="ts" x="340" y="145" text-anchor="middle" dominant-baseline="central">live · discharge · charge · cancel · smartshift</text>

<!-- Arrow: amber_graphql.py → HA Helpers -->
<line x1="340" y1="158" x2="340" y2="196" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="355" y="181" dominant-baseline="central">every 5 min</text>

<!-- HA Input Number Helpers box -->
<rect x="140" y="196" width="400" height="80" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="340" y="218" text-anchor="middle" dominant-baseline="central">HA input_number helpers</text>
<text class="ts" x="340" y="238" text-anchor="middle" dominant-baseline="central">buy price · sell price · SOC · spot price</text>
<text class="ts" x="340" y="256" text-anchor="middle" dominant-baseline="central">import cost · export earnings · last polled</text>

<!-- Four arrows down from helpers to automations -->
<line x1="210" y1="276" x2="130" y2="334" class="arr" marker-end="url(#arrow)"/>
<line x1="290" y1="276" x2="270" y2="334" class="arr" marker-end="url(#arrow)"/>
<line x1="390" y1="276" x2="410" y2="334" class="arr" marker-end="url(#arrow)"/>
<line x1="470" y1="276" x2="550" y2="334" class="arr" marker-end="url(#arrow)"/>

<!-- Four automation boxes -->
<rect x="50" y="334" width="160" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="130" y="354" text-anchor="middle" dominant-baseline="central">force export</text>
<text class="ts" x="130" y="372" text-anchor="middle" dominant-baseline="central">high sell price</text>

<rect x="200" y="334" width="160" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="280" y="354" text-anchor="middle" dominant-baseline="central">grid charge</text>
<text class="ts" x="280" y="372" text-anchor="middle" dominant-baseline="central">negative buy price</text>

<rect x="350" y="334" width="160" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="430" y="354" text-anchor="middle" dominant-baseline="central">block smart shift</text>
<text class="ts" x="430" y="372" text-anchor="middle" dominant-baseline="central">overnight window</text>

<rect x="500" y="334" width="130" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="565" y="354" text-anchor="middle" dominant-baseline="central">price notify</text>
<text class="ts" x="565" y="372" text-anchor="middle" dominant-baseline="central">email alerts</text>

<!-- Three arrows from automations to Smart Shift API -->
<line x1="130" y1="390" x2="240" y2="448" class="arr" marker-end="url(#arrow)"/>
<line x1="280" y1="390" x2="280" y2="448" class="arr" marker-end="url(#arrow)"/>
<line x1="430" y1="390" x2="340" y2="448" class="arr" marker-end="url(#arrow)"/>

<!-- Amber Smart Shift API -->
<rect x="170" y="448" width="240" height="50" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text class="th" x="290" y="468" text-anchor="middle" dominant-baseline="central">Amber Smart Shift API</text>
<text class="ts" x="290" y="485" text-anchor="middle" dominant-baseline="central">discharge · charge · smartshift on/off</text>

<!-- Arrow: Smart Shift API → Battery -->
<line x1="290" y1="498" x2="290" y2="546" class="arr" marker-end="url(#arrow)"/>

<!-- Battery -->
<rect x="200" y="546" width="180" height="50" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text class="th" x="290" y="566" text-anchor="middle" dominant-baseline="central">Your battery</text>
<text class="ts" x="290" y="583" text-anchor="middle" dominant-baseline="central">Smart Shift enrolled</text>

<!-- amber_auth.py (right side) -->
<rect x="490" y="448" width="150" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="565" y="468" text-anchor="middle" dominant-baseline="central">amber_auth.py</text>
<text class="ts" x="565" y="485" text-anchor="middle" dominant-baseline="central">AWS Cognito login</text>

<!-- HA Startup → amber_auth.py -->
<line x1="565" y1="390" x2="565" y2="448" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="580" y="424" dominant-baseline="central">HA startup</text>

<!-- amber_auth.py → token cache -->
<line x1="565" y1="498" x2="565" y2="546" class="arr" marker-end="url(#arrow)"/>

<!-- Token cache -->
<rect x="490" y="546" width="150" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="565" y="566" text-anchor="middle" dominant-baseline="central">token cache</text>
<text class="ts" x="565" y="583" text-anchor="middle" dominant-baseline="central">auto-refresh 1hr</text>

<!-- Token cache feeds amber_graphql.py (dashed path up left side) -->
<path d="M490 571 Q460 571 460 133" class="dashed" marker-end="url(#arrow-dashed)"/>
<text class="ts" x="442" y="380" text-anchor="middle" dominant-baseline="central">token</text>

</svg>
