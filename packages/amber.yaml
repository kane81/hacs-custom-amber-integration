################################################################################
# Home Assistant Custom Amber Electric Integration - HA Package
################################################################################
#
# This file is automatically loaded by Home Assistant when you add this line
# to your configuration.yaml:
#
#   homeassistant:
#     packages: !include_dir_named packages/
#
# DO NOT edit this file manually. Configure settings via Settings → Helpers.
# Credentials go in secrets.yaml — see secrets_example.yaml for the template.
#
# DISCLAIMER: This project uses Amber Electric's internal GraphQL API which
# is not publicly documented or officially supported. Amber may change or
# remove this API at any time without notice. Use at your own risk.
#
################################################################################

################################################################################
# Shell Commands
################################################################################

shell_command:
  # Authenticates with Amber via AWS Cognito and caches token
  # Called on HA startup and automatically by amber_graphql.py when expired
  amber_auth: "python3 /config/scripts/amber_auth.py"

  # Polls Amber SmartShiftLive API for current prices and metrics
  # Updates all input_number helpers which trigger downstream automations
  amber_live_poll: "python3 /config/scripts/amber_graphql.py live"

  # Forces battery discharge to grid via Amber Smart Shift API
  amber_force_discharge: "python3 /config/scripts/amber_graphql.py discharge {{ duration | default(60) }}"

  # Forces battery to charge from grid via Amber Smart Shift API
  amber_force_charge: "python3 /config/scripts/amber_graphql.py charge {{ duration | default(60) }}"

  # Forces battery to preserve current charge via Amber Smart Shift API
  # Not used by automations - available for manual use via Developer Tools
  amber_force_preserve: "python3 /config/scripts/amber_graphql.py preserve {{ duration | default(60) }}"

  # Cancels any active battery override via Amber Smart Shift API
  amber_cancel_override: "python3 /config/scripts/amber_graphql.py cancel"

  # Enables Smart Shift optimisation via Amber API
  amber_smartshift_on: "python3 /config/scripts/amber_graphql.py smartshift_on"

  # Disables Smart Shift optimisation via Amber API
  amber_smartshift_off: "python3 /config/scripts/amber_graphql.py smartshift_off"

  # Shows current battery status and active overrides
  # Not used by automations - available for manual use via Developer Tools
  amber_graphql_status: "python3 /config/scripts/amber_graphql.py status"

  # Runs the install script to copy integration files after a HACS update
  # Called automatically by amber_hacs_auto_install automation
  amber_hacs_install: "bash /config/custom_components/amber_integration/install.sh"

################################################################################
# Input Numbers
################################################################################

input_number:
  #-----------------------------------------------------------------------------
  # Amber Prices - updated every 5 minutes by amber_graphql.py live
  #-----------------------------------------------------------------------------

  amber_general_price_actual:
    name: Amber General Price Actual
    min: -1
    max: 10
    step: 0.0001
    initial: 0
    unit_of_measurement: $/kWh

  amber_feed_in_price_actual:
    name: Amber Feed In Price Actual
    min: -1
    max: 10
    step: 0.0001
    initial: 0
    unit_of_measurement: $/kWh

  amber_feed_in_spot_actual:
    name: Amber Feed In Spot Actual
    min: -1
    max: 10
    step: 0.0001
    initial: 0
    unit_of_measurement: $/kWh

  #-----------------------------------------------------------------------------
  # Amber Live Metrics - current 5-minute interval cost/earnings
  #-----------------------------------------------------------------------------

  amber_battery_soc:
    name: Amber Battery SOC
    min: 0
    max: 100
    step: 1
    initial: 0
    unit_of_measurement: "%"

  amber_import_cost_cents:
    name: Amber Import Cost Cents
    min: -10000
    max: 10000
    step: 0.0001
    initial: 0
    unit_of_measurement: "¢"

  amber_export_earnings_cents:
    name: Amber Export Earnings Cents
    min: -10000
    max: 10000
    step: 0.0001
    initial: 0
    unit_of_measurement: "¢"

  amber_total_earnings_cents:
    name: Amber Total Earnings Cents
    min: -10000
    max: 10000
    step: 0.0001
    initial: 0
    unit_of_measurement: "¢"

  #-----------------------------------------------------------------------------
  # Price Thresholds - adjust via Settings → Helpers
  #-----------------------------------------------------------------------------

  amber_last_notified_price:
    name: Amber Last Notified Price
    min: -100
    max: 100
    step: 0.01
    initial: 0
    unit_of_measurement: $/kWh

  amber_min_sell_price:
    name: Amber Min Sell Price
    min: 0
    max: 1
    step: 0.01
    # ⚠️ After your first HA restart, remove the initial: line below.
    # With initial: present HA resets this value on every restart, wiping
    # any changes you made via Settings → Helpers.
    # Without initial: HA restores the last value you set.
    initial: 0.15
    unit_of_measurement: $/kWh

  amber_min_soc_to_sell:
    name: Amber Min SOC to Sell
    min: 0
    max: 100
    step: 1
    # ⚠️ After your first HA restart, remove the initial: line below.
    # With initial: present HA resets this value on every restart, wiping
    # any changes you made via Settings → Helpers.
    # Without initial: HA restores the last value you set.
    initial: 10
    unit_of_measurement: "%"


################################################################################
# Input Datetimes
# Adjust time windows via Settings → Helpers
################################################################################

input_datetime:
  amber_last_polled:
    name: Amber Last Polled
    has_date: true
    has_time: true

  amber_charge_on_negative_start:
    name: Amber Charge on Negative Start
    has_date: false
    has_time: true
    # ⚠️ After your first HA restart, remove the initial: line below.
    # With initial: present HA resets this value on every restart, wiping
    # any changes you made via Settings → Helpers.
    # Without initial: HA restores the last value you set.
    initial: "10:00:00"

  amber_charge_on_negative_end:
    name: Amber Charge on Negative End
    has_date: false
    has_time: true
    # ⚠️ After your first HA restart, remove the initial: line below.
    # With initial: present HA resets this value on every restart, wiping
    # any changes you made via Settings → Helpers.
    # Without initial: HA restores the last value you set.
    initial: "17:00:00"

  amber_force_sell_on_custom_fit_start:
    name: Amber Force Sell Start
    has_date: false
    has_time: true
    # ⚠️ After your first HA restart, remove the initial: line below.
    # With initial: present HA resets this value on every restart, wiping
    # any changes you made via Settings → Helpers.
    # Without initial: HA restores the last value you set.
    initial: "16:00:00"

  amber_force_sell_on_custom_fit_end:
    name: Amber Force Sell End
    has_date: false
    has_time: true
    # ⚠️ After your first HA restart, remove the initial: line below.
    # With initial: present HA resets this value on every restart, wiping
    # any changes you made via Settings → Helpers.
    # Without initial: HA restores the last value you set.
    initial: "06:00:00"

  amber_block_smart_shift_start:
    name: Amber Block Smart Shift Start
    has_date: false
    has_time: true
    # ⚠️ After your first HA restart, remove the initial: line below.
    # With initial: present HA resets this value on every restart, wiping
    # any changes you made via Settings → Helpers.
    # Without initial: HA restores the last value you set.
    initial: "00:00:00"

  amber_block_smart_shift_end:
    name: Amber Block Smart Shift End
    has_date: false
    has_time: true
    # ⚠️ After your first HA restart, remove the initial: line below.
    # With initial: present HA resets this value on every restart, wiping
    # any changes you made via Settings → Helpers.
    # Without initial: HA restores the last value you set.
    initial: "06:00:00"

################################################################################
# Input Booleans
################################################################################

input_boolean:
  #-----------------------------------------------------------------------------
  # Automation Enable / Disable Switches (default OFF)
  # Toggle via Settings → Helpers or dashboard card
  #-----------------------------------------------------------------------------

  amber_enable_block_smart_shift:
    name: "Enable Automation: Block Smart Shift"
    # restore_mode: On first install defaults to off (no stored state exists).
    # After first restart HA remembers whatever the user last set.
    # This prevents settings resetting to default on every HA restart.
    restore_mode: restore_default_zero
    icon: mdi:power-sleep

  amber_enable_charge_on_negative_buy:
    name: "Enable Automation: Charge on Negative Buy"
    # restore_mode: On first install defaults to off (no stored state exists).
    # After first restart HA remembers whatever the user last set.
    # This prevents settings resetting to default on every HA restart.
    restore_mode: restore_default_zero
    icon: mdi:battery-charging

  amber_enable_force_export_custom_fit:
    name: "Enable Automation: Force Export Custom FiT"
    # restore_mode: On first install defaults to off (no stored state exists).
    # After first restart HA remembers whatever the user last set.
    # This prevents settings resetting to default on every HA restart.
    restore_mode: restore_default_zero
    icon: mdi:transmission-tower-export

  amber_enable_negative_price_notify:
    name: "Enable Automation: Negative Price Notify"
    # restore_mode: On first install defaults to off (no stored state exists).
    # After first restart HA remembers whatever the user last set.
    # This prevents settings resetting to default on every HA restart.
    restore_mode: restore_default_zero
    icon: mdi:bell-alert

  #-----------------------------------------------------------------------------
  # Automation State Tracking Flags
  # Set/cleared by automations — do not toggle manually
  #-----------------------------------------------------------------------------

  amber_grid_charging_active:
    # initial: false is intentional — this is a session state flag
    # that must always reset to off on restart. Do NOT remove initial:.
    name: Amber Grid Charging Active
    initial: false

  amber_block_smart_shift_active:
    # initial: false is intentional — this is a session state flag
    # that must always reset to off on restart. Do NOT remove initial:.
    name: Amber Block Smart Shift Active
    initial: false

  amber_force_export_active:
    # initial: false is intentional — this is a session state flag
    # that must always reset to off on restart. Do NOT remove initial:.
    name: Amber Force Export Active
    icon: mdi:transmission-tower-export

  # True when Amber cannot communicate with the battery
  # Set by: amber_graphql.py live poll when stateOfChargePercentage is None
  # Used by: dashboard card to show offline warning
  amber_battery_offline:
    # initial: false is intentional — this is a session state flag
    # that must always reset to off on restart. Do NOT remove initial:.
    name: Amber Battery Offline
    initial: false
    icon: mdi:battery-off

################################################################################
# Notifications
#
# Default: posts to the HA Notifications bell (🔔) — no setup required.
#
# To add email or mobile push, see the Notifications section in README.md.
# The name "notification" must not be changed — all automations use it.
################################################################################

notify:
  - name: notification
    platform: group
    services:
      - service: persistent_notification

  # ─── OPTIONAL: uncomment and fill in to add email ─────────────────────────
  # Then add "- service: amber_smtp" to the group services above.
  #
  # - name: amber_smtp
  #   platform: smtp
  #   server: smtp.gmail.com
  #   port: 587
  #   timeout: 15
  #   sender: !secret smtp_username
  #   encryption: starttls
  #   username: !secret smtp_username
  #   password: !secret smtp_password
  #   recipient:
  #     - "your@email.com"    # ← your email address
  #   sender_name: "Home Assistant - Amber"
  #
  # ─── OPTIONAL: add mobile push to the group services above ────────────────
  # Find your device name: Developer Tools → Actions → search notify.mobile_app
  # Then add e.g. "- service: mobile_app_kanes_iphone" to the group above.
